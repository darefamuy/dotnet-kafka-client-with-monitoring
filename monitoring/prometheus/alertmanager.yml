global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'team']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'hci-platform'

receivers:
  - name: 'hci-platform'
    # Configure your notification channel here:
    # webhook_configs, email_configs, slack_configs, etc.
    # Example Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#hci-kafka-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ .Annotations.description }}'
